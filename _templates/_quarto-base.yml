# Quarto Book Configuration
# Generated by: make new-ebook

project:
  type: book
  output-dir: ../../_output/books/{{slug}}

book:
  title: "{{title}}"
  subtitle: "{{subtitle}}"
  author: "Zopdev Team"
  date: today
  chapters:
    - index.qmd
    - chapters/01-intro.qmd

format:
  html:
    theme: [cosmo, brand, ../../_themes/zopdev-book.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    code-link: true
  pdf:
    documentclass: book
    include-in-header: ../../_themes/preamble.tex
    toc: true
    number-sections: true
    colorlinks: true
    keep-tex: false
  epub:
    css: ../../_themes/zopdev-epub.css
    toc: true
    number-sections: true
