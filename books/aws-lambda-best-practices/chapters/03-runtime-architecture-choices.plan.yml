chapter_id: 03-runtime-architecture-choices
density_level: standard
word_target:
  - 1200
  - 1800
sections:
  - id: opening
    heading: ""
    word_target: 150
    visual:
      type: stat-card
      purpose: Hook readers with Lambda's massive scale and Graviton2 opportunity
      stat_data:
        headline: 1.5M+
        subtext: monthly active Lambda customers processing tens of trillions of invocations
        source: AWS Compute Blog
    notes: "Open with the scale of AWS Lambda adoption. Mention the 1.5M+ customers and tens of trillions of invocations.
      Transition to the opportunity: most Lambda functions are running on x86_64 and missing out on 20% cost savings and
      19% better performance. This chapter covers three optimization vectors: processor migration (Graviton2), package
      optimization, and event-driven design patterns. Keep the tone data-driven, not narrative."
  - id: graviton2_migration
    heading: "Graviton2 arm64 Migration: Steps and Verification"
    word_target: 350
    visual:
      type: comparison-graphic
      purpose: Show Graviton2 vs x86_64 performance and cost differences
      comparison_data:
        title: Graviton2 Performance vs x86_64
        before:
          label: x86_64 Lambda
          value: Baseline
        after:
          label: Graviton2 arm64
          value: 20% lower cost, 19% better performance
        improvement: 13-24% faster cold start initialization
    notes: "Cover the business case first: Graviton2 offers up to 19% better performance at 20% lower cost (cite Wiz). For
      Lambda specifically, arm64 functions show 13-24% faster cold start initialization (cite AgileSoftLabs). Migration
      steps: 1) Update function runtime settings in console or update-function-configuration CLI with --architecture
      arm64, 2) Ensure your deployment packages are rebuilt for arm64 (different base images, binaries compiled for
      arm64), 3) Test thoroughly - some native dependencies may behave differently, 4) Verify with parallel invocation
      testing. Include a note about checking that all layers and dependencies support arm64. Mention that most managed
      runtimes (Python, Node.js, Go) work seamlessly but custom runtimes need rebuilding."
  - id: sdk_v3_modular
    heading: "AWS SDK v3 Modular Imports: Reducing Package Bloat"
    word_target: 250
    visual:
      type: code
      language: javascript
      template: sdk-v3-imports
      purpose: Show before/after of SDK imports for package size reduction
      style: side-by-side
    notes: "Explain the problem: AWS SDK v2 bundled everything, causing large package sizes and slower cold starts. SDK v3
      is modular - import only what you need. Show code comparison: OLD (v2): const AWS = require('aws-sdk'); const
      dynamo = new AWS.DynamoDB.DocumentClient(); NEW (v3): import { DynamoDBClient } from '@aws-sdk/client-dynamodb';
      import { DynamoDBDocumentClient } from '@aws-sdk/lib-dynamodb'; This reduces bundle size significantly - can be
      70%+ smaller. Mention that each client import (S3, Lambda, DynamoDB) is a separate package. Also cover: use
      @aws-sdk/lib-dynamodb for DocumentClient convenience, and note that shared config (regional endpoints,
      credentials) should be instantiated once and reused. Include a note about tree-shaking benefits with bundlers like
      esbuild."
  - id: package_lightweight_alternatives
    heading: "Lightweight Library Alternatives: Dayjs, Zod, and Beyond"
    word_target: 200
    visual:
      type: code
      language: javascript
      template: package-comparison
      purpose: Show size difference between heavy and lightweight alternatives
      style: table-format
    notes: "Beyond SDK, audit all dependencies for lightweight alternatives. Cover two key examples: dayjs (~2KB) vs
      moment.js (~300KB) - same API, much smaller, moment is in maintenance mode. zod (~15KB) vs joi (~200KB) - zod is
      runtime validation with TypeScript inference built-in. Mention other common swaps: axios (8KB) vs node-fetch
      (several KB), lodash-es (core lodash modular) vs full lodash. Explain the cold start impact: smaller packages =
      faster extraction from Lambda execution environment = lower init duration. Recommend running bundle analysis
      (webpack-bundle-analyzer, esbuild's --bundle --metafile) to identify bloat. Note: these swaps require some code
      changes but maintain similar APIs."
  - id: event_driven_architecture
    heading: "Event-Driven Design: S3 Notifications, DynamoDB Streams, EventBridge"
    word_target: 400
    visual:
      type: d2
      template: event-flow
      purpose: Visualize event-driven Lambda triggers and data flow
      style: flowchart
    notes: "Event-driven architecture eliminates wasted invocations - you only pay when work exists. Cover three primary
      patterns: 1) S3 Event Notifications: object created, deleted, or reduced (via lifecycle) triggers Lambda.
      Configure event types (s3:ObjectCreated:*, s3:ObjectRemoved:*), can filter with prefixes/suffixes. 2) DynamoDB
      Streams: capture item-level changes (INSERT, MODIFY, REMOVE) with sequence numbers. Process near-real-time, shard
      iterator management. Lambda polls streams automatically. 3) EventBridge: decoupled architecture, rule-based
      filtering, cross-account/region patterns. Compare: S3 Events = tight coupling to bucket operations, EventBridge =
      loose coupling and fan-out, DynamoDB Streams = change data capture. Emphasize: these patterns eliminate polling
      loops that waste invocations. Include a real-world example: processing uploaded images (S3 event -> Lambda
      thumbnail generation)."
  - id: roi_calculator
    heading: Model Your Optimization ROI
    word_target: 150
    visual:
      type: ojs
      template: roi-calculator
      purpose: Let readers calculate potential savings from Graviton2 migration and package optimization
      style: interactive
    notes: "This interactive section allows readers to input their current Lambda configuration and see projected savings.
      Inputs: monthly invocations, average duration (ms), memory allocated (MB), current architecture (x86/arm64),
      package size (MB). Outputs: Graviton2 cost savings (20% of compute costs), cold start improvement estimate
      (13-24%), package size reduction estimate (if switching SDK and libraries). Show annual savings projection. This
      makes the chapter actionable - readers can see their specific numbers. Note: calculator uses conservative
      estimates; actual results vary by workload."
  - id: summary
    heading: "Summary: Three Paths to Faster, Cheaper Lambdas"
    word_target: 200
    visual:
      type: metric-highlight
      metrics_data:
        - label: Graviton2 Cost
          value: -20%
          trend: down
        - label: Graviton2 Performance
          value: +19%
          trend: up
        - label: Cold Start Improvement
          value: 13-24%
          trend: down
        - label: SDK v3 Bundle Reduction
          value: ~70%
          trend: down
      purpose: Recap key metrics from the chapter
    notes: "Synthesize the three optimization paths: 1) Graviton2 migration is low-effort, high-impact (20% cost reduction,
      19% performance improvement). Check dependencies for arm64 compatibility. 2) Package optimization (SDK v3 modular
      imports, lightweight libraries like dayjs/zod) reduces cold start times by lowering init duration. 3) Event-driven
      design eliminates wasted invocations - use S3 Events, DynamoDB Streams, or EventBridge instead of polling. Mention
      that these strategies compound: smaller packages + Graviton2 = faster cold starts + lower costs. Close with a
      recommended action sequence: start with Graviton2 (easiest win), then audit packages, then evaluate event-driven
      patterns for polling-heavy workloads."
content_seeds:
  opening_hook: AWS Lambda serves over 1.5 million monthly active customers and processes tens of trillions of invocations
    - yet the majority of these functions run on x86_64 architecture, leaving significant performance and cost
    optimization on the table.
  key_claims:
    - Graviton2 arm64 processors offer 20% lower cost and 19% better performance vs x86_64
    - Graviton2 Lambda functions show 13-24% faster cold start initialization
    - AWS SDK v3 modular imports can reduce bundle size by ~70%
    - Event-driven patterns eliminate wasted invocations from polling loops
  patterns:
    - "Graviton2 Processor Migration: 19-34% better price/performance, 20% lower cost savings, Low effort"
    - "Package Size Optimization: Faster cold starts; smaller deployment packages reduce init duration savings, Medium
      effort"
    - "Event-Driven Architecture: Eliminates wasted invocations; pay only for actual work savings, Medium effort"
    - "Execution Context Reuse: Reduces cold start latency; eliminates connection overhead for subsequent invocations
      savings, Low effort"
    - "Memory Right-Sizing: Lower total cost per invocation when duration decreases proportionally savings, Medium
      effort"
  configs:
    - name: Graviton2 function configuration
      type: lambda
      content: aws lambda update-function-configuration --function-name my-function --architectures arm64 --runtime nodejs20.x
    - name: S3 event notification pattern
      type: s3
      content: '{"Event": "s3:ObjectCreated:*", "Bucket": "my-bucket"}'
    - name: DynamoDB Stream event source mapping
      type: lambda
      content: aws lambda create-event-source-mapping --function-name my-processor --event-source-arn
        arn:aws:dynamodb:us-east-1:123456789:table/my-table/stream/2024-01-01T00:00:00.000 --starting-position LATEST
  product_tie_in: These optimizations work seamlessly with the standard Lambda runtime. For teams using provisioned
    concurrency for consistent latency, Graviton2 provides the same benefits at lower cost. The event-driven patterns
    pair naturally with Step Functions for complex workflows.
