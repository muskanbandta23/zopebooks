      style: flowchart
    notes: "Explain the fundamental difference: Standard concurrency scales to zero when idle; Provisioned Concurrency
      maintains a pool of pre-initialized instances. Cover concurrency limits as the ceiling on concurrent executions,
      and how Provisioned Concurrency guarantees availability. Include a comparison table showing standard vs.
      provisioned behavior. Mention that Provisioned Concurrency is billed per GB-hour, not per invocation."
  - id: cost_calculation
    heading: The Math Behind Provisioned Concurrency Savings
    word_target: 400
    visual:
      type: comparison-graphic
      comparison_data:
        title: Duration Cost Comparison
        before:
