          value: 84% duration cost
        improvement: 16% savings when fully utilized
    notes: "This is the data-heavy section. Cover the duration savings formula: When functions are always warm, you
      eliminate init duration overhead. Show the calculation: Provisioned Concurrency cost = (Provisioned Concurrency
