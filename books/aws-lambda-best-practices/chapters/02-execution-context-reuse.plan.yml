content_seeds:
  opening_hook: "With over 1.5 million monthly active customers processing trillions of invocations, AWS Lambda has become
    the backbone of serverless computing. Yet the majority of Lambda functions still suffer from a performance
    anti-pattern: reinitializing expensive resources on every single invocation. While languages like Rust achieve
    16-20ms cold starts on arm64, Python functions still face 220-430ms delays—and Java can hit 1600-2200ms. The
    solution isn't faster languages or provisioned concurrency—it's leveraging Lambda's built-in execution context
    reuse."
  key_claims:
    - Initialization code outside the handler runs once per container, not per invocation
    - AWS SDK v3 modular imports reduce package size by 94% compared to v2 monolith
    - Database connection pooling outside the handler eliminates TCP handshake overhead
    - Graviton2 processors provide 13-24% faster cold starts as a complementary optimization
    - Context reuse requires zero additional cost—it's built into Lambda's architecture
  patterns:
    - "Execution Context Reuse: Reduces cold start latency; eliminates connection overhead for subsequent invocations"
    - "Graviton2 Processor Migration: 19-34% better price/performance at 20% lower cost"
    - "Provisioned Concurrency: 100% warm availability but higher cost than free context reuse"
    - "Package Size Optimization: Smaller deployments reduce init duration"
  configs:
    example_aws_sdk_v3: |-
      const { DynamoDBClient, GetItemCommand } = require('@aws-sdk/client-dynamodb');
      const client = new DynamoDBClient({ region: 'us-east-1' });

      exports.handler = async (event) => {
        const command = new GetItemCommand({ /* params */ });
        return client.send(command);
      };
    example_connection_pool: |-
      const { Pool } = require('pg');
      // Initialize outside handler - runs once per container
      const pool = new Pool({ connectionString: process.env.DATABASE_URL });

      exports.handler = async (event) => {
        // Reuses existing connection from pool
        const result = await pool.query('SELECT * FROM users WHERE id = $1', [event.userId]);
        return result.rows[0];
      };
  product_tie_in: This chapter focuses on the foundational code patterns that work with any Lambda runtime. For teams
    ready to implement these patterns at scale, the same principles apply across Python, Node.js, Go, and Java
    functions—the key is ensuring any expensive initialization happens in the module scope, not inside the handler.
