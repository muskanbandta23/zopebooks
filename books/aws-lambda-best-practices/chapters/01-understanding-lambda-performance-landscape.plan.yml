sections:
  - id: opening
    heading: ""
    word_target: 120
    visual:
      type: stat-card
      stat_data:
        headline: 1.5M+
        subtext: monthly active AWS Lambda customers
        source: AWS Compute Blog
      purpose: Establish the scale and relevance of Lambda in modern infrastructure
    notes: Open with the massive scale of AWS Lambda adoption (1.5M+ customers, tens of trillions of invocations). Hook the
      SRE audience by framing cold starts as a reliability and latency concern that directly impacts their SLAs.
      Introduce that this chapter will demystify the cold start lifecycle and help SREs understand when and why it
      matters for their services.
  - id: cold_start_lifecycle
    heading: "The Cold Start Lifecycle: Init, Invoke, and Shutdown"
    word_target: 250
    visual:
      type: d2
      template: vpa-workflow
      purpose: Visualize the three phases of Lambda execution lifecycle
    notes: "Explain the three distinct phases of Lambda execution: (1) INIT - loading the runtime, executing initialization
      code, and setting up the execution environment; (2) INVOKE - running the handler function (this is when your code
      actually executes); (3) SHUTDOWN - AWS shutting down the environment after the function hasn't been invoked for a
      period. Define what constitutes a 'cold start' (when INIT runs) vs. a 'warm invocation' (when only INVOKE runs).
      Mention that the INIT phase is where most cold start latency originates. Include a simple code example showing
      where initialization code goes (outside the handler)."
  - id: runtime_comparison
    heading: "Runtime Performance: Why Your Language Choice Matters"
    word_target: 250
    visual:
      type: comparison-graphic
      comparison_data:
        title: Cold Start Times by Runtime (arm64)
        before:
          label: Java 17
          value: 1600-2200ms
        after:
          label: Rust (arm64)
          value: 16-20ms
        improvement: Rust is 80-100x faster than Java for cold starts
      purpose: Show dramatic performance differences between runtimes
    notes: "Present the benchmark data showing cold start times across languages: Rust 16-20ms, Python 220-430ms, Java
      1600-2200ms. Explain WHY these differences exist (JVM startup overhead, interpreted vs compiled, runtime
      initialization). Introduce AWS Graviton2 (arm64) as offering 13-24% faster cold starts and 19% better performance
      at 20% lower cost. This sets the foundation for understanding runtime selection as an SRE concern. Don't dive deep
      into optimization patterns yet—just establish the baseline problem."
  - id: sla_implications
    heading: Why Cold Starts Matter to Your SLAs
    word_target: 200
    visual:
      type: metric-highlight
      metrics_data:
        - label: p99 Latency
          value: +1-2s
          trend: up
        - label: Error Rate
          value: +5-15%
          trend: up
        - label: User Satisfaction
          value: -20%
          trend: down
      purpose: Illustrate the business impact of unmitigated cold starts
    notes: "Connect cold starts to SRE-specific concerns: latency-sensitive workloads (API gateways, real-time applications,
      user-facing endpoints) suffer from cold start-induced p99 latency spikes. Explain how cold starts can cause
      timeout errors in client applications, failed health checks, and violated SLOs. Mention that certain architectures
      (synchronous APIs, interactive user experiences) are more vulnerable than others (async event processing,
      background jobs). This section establishes the PROBLEM that optimization patterns will solve."
  - id: optimization_patterns
    heading: Key Optimization Strategies for SREs
    word_target: 250
    visual:
      type: d2
      template: platform-maturity-stages
      purpose: Show progression from basic to advanced cold start mitigation
    notes: "Briefly introduce the main optimization patterns available: (1) Provisioned Concurrency - keeps functions warm,
      100% availability but 16% cost premium when fully utilized; (2) Execution Context Reuse - subsequent invocations
      reuse initialized connections; (3) Graviton2 Migration - 19-34% better price/performance, low effort; (4) Package
      Size Optimization - smaller packages init faster. Position these as tools in the SRE toolkit. Keep this
      survey-level—we'll cover implementation details in later chapters. Emphasate that not all workloads need
      mitigation; context matters."
  - id: summary
    heading: "Summary: Cold Starts Are a Solvable Problem"
    word_target: 130
    visual: null
    notes: "Recap the key takeaways: (1) Cold starts occur during the INIT phase and add 16ms-2s+ depending on runtime; (2)
      Language choice dramatically impacts cold start latency—Rust dramatically outperforms Python and Java; (3)
      Graviton2 processors provide meaningful improvements at lower cost; (4) For latency-sensitive workloads, cold
      starts directly impact SLA compliance; (5) Multiple mitigation strategies exist ranging from provisioned
      concurrency to architecture changes. Frame this as the beginning of the optimization journey—the foundation SREs
      need before diving into implementation details."
