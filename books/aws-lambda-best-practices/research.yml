common_patterns:
  - name: Provisioned Concurrency
    description: Pre-initialize Lambda execution environments to eliminate cold starts for production workloads
    typical_savings: 16% savings on duration cost when fully utilized; 100% warm availability
    implementation_effort: Low
    risk: Low
    eligibility: All Lambda functions, best for latency-sensitive applications
  - name: Graviton2 Processor Migration
    description: Switch from x86_64 to arm64 Graviton2 processors for improved price-performance
    typical_savings: 19-34% better price/performance, 20% lower cost
    implementation_effort: Low
    risk: Low
    eligibility: All Lambda functions; may require repackaging for x86-specific binaries
  - name: Execution Context Reuse
    description: Initialize SDK clients, DB connections, and caches outside the function handler
    typical_savings: Reduces cold start latency; eliminates connection overhead for subsequent invocations
    implementation_effort: Low
    risk: Low
    eligibility: All Lambda functions with external dependencies
  - name: Package Size Optimization
    description: Use modular AWS SDK v3, lightweight alternatives (dayjs vs moment.js), avoid heavy ORMs
    typical_savings: Faster cold starts; smaller deployment packages reduce init duration
    implementation_effort: Medium
    risk: Low
    eligibility: All Lambda functions with dependencies
  - name: Event-Driven Architecture
    description: Use S3, DynamoDB Streams, or EventBridge triggers instead of polling
    typical_savings: Eliminates wasted invocations; pay only for actual work
    implementation_effort: Medium
    risk: Medium
    eligibility: Applications with event-driven workloads
  - name: Memory Right-Sizing
    description: Increase memory allocation to reduce execution duration; benchmark with Lambda Power Tuning
    typical_savings: Lower total cost per invocation when duration decreases proportionally
    implementation_effort: Medium
    risk: Low
    eligibility: All Lambda functions
