# Quarto Book Configuration
# Generated by: make new-ebook

project:
  type: book
  output-dir: ../../_output/books/k8s-cost-guide

book:
  title: "Kubernetes Cost Guide"
  subtitle: "Optimizing Container Spending"
  author: "Zopdev Team"
  date: today
  chapters:
    - index.qmd
    - chapters/01-why-kubernetes-cost-optimizati.qmd
    - chapters/02-understanding-the-kubernetes-c.qmd
    - chapters/03-kubernetes-cost-optimization-s.qmd

filters:
  - d2

d2:
  layout: elk
  theme: NeutralDefault
  pad: 20

format:
  html:
    theme: [cosmo, brand, ../../_themes/zopdev-book.scss]
    toc: true
    toc-depth: 3
    number-sections: true
    code-link: true
    code-copy: true
    code-overflow: wrap
  pdf:
    documentclass: book
    classoption: [oneside, 11pt]
    pdf-engine: xelatex
    include-in-header: ../../_themes/preamble.tex
    toc: true
    number-sections: true
    colorlinks: true
    keep-tex: false
  epub:
    css: ../../_themes/zopdev-epub.css
    toc: true
    number-sections: true
