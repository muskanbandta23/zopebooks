# Zopdev Brand Configuration
# This file is consumed natively by Quarto and read by landing/social generators.
# See: https://quarto.org/docs/authoring/brand.html

color:
  palette:
    blue: "#0052FF"
    dark-blue: "#003DBF"
    light-blue: "#E6EDFF"
    navy: "#0A1628"
    white: "#FFFFFF"
    gray-50: "#F8FAFC"
    gray-100: "#F1F5F9"
    gray-200: "#E2E8F0"
    gray-300: "#CBD5E1"
    gray-400: "#94A3B8"
    gray-500: "#64748B"
    gray-600: "#475569"
    gray-700: "#334155"
    gray-800: "#1E293B"
    gray-900: "#0F172A"
  foreground: navy
  background: white
  primary: blue
  secondary: gray-600
  link: blue

typography:
  base:
    family: "Inter"
    weight: 400
    size: 1rem
    line-height: 1.7
  headings:
    family: "Inter"
    weight: 700
    color: navy
    line-height: 1.3
  monospace:
    family: "JetBrains Mono"
    weight: 400
    size: 0.875em
  monospace-inline:
    color: blue

logo:
  small: logos/zopdev-logo-light.svg
  medium: logos/zopdev-logo-light.svg
  large: logos/zopdev-logo-light.svg
