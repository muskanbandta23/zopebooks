# Zopdev Brand Configuration
# This file is consumed natively by Quarto and read by landing/social generators.
# See: https://quarto.org/docs/authoring/brand.html

color:
  palette:
    blue: "#4F46E5"
    dark-blue: "#3730A3"
    light-blue: "#EEF2FF"
    navy: "#0A1628"
    white: "#FFFFFF"
    off-white: "#FAFAFA"
    gray-50: "#FAFAFA"
    gray-100: "#F5F5F5"
    gray-200: "#E5E5E5"
    gray-300: "#D4D4D4"
    gray-400: "#A3A3A3"
    gray-500: "#737373"
    gray-600: "#525252"
    gray-700: "#404040"
    gray-800: "#262626"
    gray-900: "#171717"
  foreground: navy
  background: off-white
  primary: blue
  secondary: gray-500
  link: blue

typography:
  base:
    family: "Inter"
    weight: 400
    size: 1rem
    line-height: 1.75
  headings:
    family: "Inter"
    weight: 600
    color: navy
    line-height: 1.2
  monospace:
    family: "JetBrains Mono"
    weight: 400
    size: 0.875em
  monospace-inline:
    color: dark-blue

logo:
  small: logos/zopdev-logo-light.svg
  medium: logos/zopdev-logo-light.svg
  large: logos/zopdev-logo-light.svg
