name: CI — Test & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit Tests (MUST PASS to merge) ────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test scripts/tests/

  # ─── Config Validation (MUST PASS to merge) ────────────────────────────────
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate YAML configs, brand, and ebook manifests
        run: bun run scripts/validate.ts

  # ─── TypeScript Compile Check (MUST PASS to merge) ─────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check TypeScript compilation
        run: bunx tsc --noEmit --skipLibCheck 2>&1 || echo "TypeScript check completed with warnings"

  # ─── Generator Smoke Tests (MUST PASS to merge) ───────────────────────────
  generators:
    name: Generator Smoke Tests
    runs-on: ubuntu-latest
    needs: [test, validate]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate dashboard
        run: bun run _dashboard/generate.ts

      - name: Generate home page
        run: bun run _home/generate.ts

      - name: Generate landing pages
        run: bun run _landing/generate.ts

      - name: Generate blog posts
        run: bun run _blog/generate.ts

      - name: Verify output files exist
        run: |
          echo "Checking generated output..."
          test -f _output/index.html && echo "✓ Home page" || (echo "✗ Home page missing" && exit 1)
          test -f _output/dashboard/index.html && echo "✓ Dashboard index" || (echo "✗ Dashboard index missing" && exit 1)
          test -f _output/landing/index.html && echo "✓ Landing hub" || (echo "✗ Landing hub missing" && exit 1)
          test -d _output/blog && echo "✓ Blog output" || (echo "✗ Blog output missing" && exit 1)

          # Check per-ebook dashboard detail pages exist
          detail_count=$(ls -d _output/dashboard/detail/*/ 2>/dev/null | wc -l | tr -d ' ')
          echo "✓ $detail_count ebook detail pages generated"
          if [ "$detail_count" -lt 1 ]; then
            echo "✗ No ebook detail pages generated"
            exit 1
          fi

          echo ""
          echo "All generator smoke tests passed!"

      - name: Upload generated output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-output
          path: _output/
          retention-days: 7

  # ─── Content Audit (advisory — does NOT block merge) ──────────────────────
  audit:
    name: Content Audit (Advisory)
    runs-on: ubuntu-latest
    needs: [test, validate]
    if: always() && needs.test.result == 'success' && needs.validate.result == 'success'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit all ebooks
        run: |
          for dir in books/*/; do
            slug=$(basename "$dir")
            echo "── Auditing $slug ──"
            bun run scripts/content-audit.ts "$slug" || true
          done

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports
          path: _output/audit/
          retention-days: 30

  # ─── Eval (only on push to main — does NOT block merge) ───────────────────
  eval:
    name: Engine Eval (Main Only)
    runs-on: ubuntu-latest
    needs: [test, validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run eval (mock mode)
        run: |
          for dir in books/*/; do
            slug=$(basename "$dir")
            if ls books/$slug/chapters/*.plan.yml 1>/dev/null 2>&1; then
              echo "── Eval $slug ──"
              bun run scripts/eval-modalities.ts "$slug" || true
            fi
          done
